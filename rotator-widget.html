<!-- ============================================================
     Node editor config panel
     ============================================================ -->
<script type="text/x-red" data-template-name="rotator-widget">
    <div class="form-row">
        <label for="node-input-group"><i class="fa fa-table"></i> Group</label>
        <input type="text" id="node-input-group">
    </div>
    <div class="form-row">
        <label for="node-input-size"><i class="fa fa-object-group"></i> Size</label>
        <input type="text" id="node-input-size">
    </div>
    <div class="form-row">
        <label for="node-input-label"><i class="fa fa-tag"></i> Label</label>
        <input type="text" id="node-input-label" placeholder="Rotator">
    </div>
    <hr/>
    <div class="form-row">
        <label for="node-input-qth"><i class="fa fa-map-marker"></i> QTH Grid</label>
        <input type="text" id="node-input-qth" placeholder="e.g. FN31 or FN31pr" maxlength="6"
               style="width:8em; text-transform:uppercase;">
    </div>
    <div class="form-row">
        <label for="node-input-currentAzimuth"><i class="fa fa-compass"></i> Current Az.</label>
        <input type="number" id="node-input-currentAzimuth" min="0" max="359" step="1"
               placeholder="0" style="width:6em;"> &deg;
    </div>
    <div class="form-row">
        <label for="node-input-targetAzimuth"><i class="fa fa-crosshairs"></i> Target Az.</label>
        <input type="number" id="node-input-targetAzimuth" min="0" max="359" step="1"
               placeholder="0" style="width:6em;"> &deg;
    </div>
    <hr/>
    <div class="form-row">
        <label style="width:140px;" for="node-input-colorOcean"><i class="fa fa-tint"></i> Ocean color</label>
        <input type="color" id="node-input-colorOcean" style="width:4em;height:2em;padding:1px;cursor:pointer;">
    </div>
    <div class="form-row">
        <label style="width:140px;" for="node-input-colorLand"><i class="fa fa-globe"></i> Land color</label>
        <input type="color" id="node-input-colorLand" style="width:4em;height:2em;padding:1px;cursor:pointer;">
    </div>
    <div class="form-row">
        <label style="width:140px;" for="node-input-colorCurrent"><i class="fa fa-location-arrow"></i> Current az. color</label>
        <input type="color" id="node-input-colorCurrent" style="width:4em;height:2em;padding:1px;cursor:pointer;">
    </div>
    <div class="form-row">
        <label style="width:140px;" for="node-input-colorTarget"><i class="fa fa-crosshairs"></i> Target az. color</label>
        <input type="color" id="node-input-colorTarget" style="width:4em;height:2em;padding:1px;cursor:pointer;">
    </div>
    <div class="form-row">
        <label style="width:140px;" for="node-input-colorAligned"><i class="fa fa-check"></i> Aligned az. color</label>
        <input type="color" id="node-input-colorAligned" style="width:4em;height:2em;padding:1px;cursor:pointer;">
        <span style="margin-left:6px;font-size:11px;color:#888;">shown when within 5°</span>
    </div>
    <div class="form-row">
        <label style="width:140px;" for="node-input-colorLandOutline"><i class="fa fa-pencil"></i> Land outline</label>
        <input type="color" id="node-input-colorLandOutline" style="width:4em;height:2em;padding:1px;cursor:pointer;">
    </div>
    <hr/>
    <div class="form-row">
        <label style="width:140px;" for="node-input-colorEquator"><i class="fa fa-minus"></i> Equator</label>
        <input type="color" id="node-input-colorEquator" style="width:4em;height:2em;padding:1px;cursor:pointer;">
    </div>
    <div class="form-row">
        <label style="width:140px;" for="node-input-colorTropics"><i class="fa fa-minus"></i> Tropics</label>
        <input type="color" id="node-input-colorTropics" style="width:4em;height:2em;padding:1px;cursor:pointer;">
    </div>
    <div class="form-row">
        <label style="width:140px;" for="node-input-colorPolarCircles"><i class="fa fa-minus"></i> Polar circles</label>
        <input type="color" id="node-input-colorPolarCircles" style="width:4em;height:2em;padding:1px;cursor:pointer;">
    </div>
    <div class="form-row">
        <label style="width:140px;" for="node-input-latLineWidth"><i class="fa fa-arrows-h"></i> Lat. line width</label>
        <input type="number" id="node-input-latLineWidth" min="0.2" max="5" step="0.1"
               placeholder="0.8" style="width:5em;"> px
    </div>
</script>

<!-- ============================================================
     Help text (shown in the Node-RED info panel)
     ============================================================ -->
<script type="text/x-red" data-help-name="rotator-widget">
    <p>An antenna rotator widget for Node-RED Dashboard 1.0.</p>
    <p>Displays an azimuthal equidistant world map centred on your QTH with
       directional indicators for the current and target azimuths.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt>
        <dd>Current azimuth in degrees (0–359). Short-hand for <code>msg.currentAzimuth</code>.</dd>
        <dt>currentAzimuth <span class="property-type">number</span></dt>
        <dd>Current azimuth in degrees (0–359).</dd>
        <dt>targetAzimuth <span class="property-type">number</span></dt>
        <dd>Target azimuth in degrees (0–359).</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt>
        <dd>Target azimuth (degrees) selected by clicking on the map.</dd>
        <dt>topic <span class="property-type">string</span></dt>
        <dd><code>"targetAzimuth"</code></dd>
    </dl>

    <h3>Display logic</h3>
    <ul>
        <li>If current and target differ by <strong>&gt; 5°</strong>: current azimuth shown in <span style="color:blue">blue</span>, target in <span style="color:red">red</span>.</li>
        <li>If within 5°: single indicator shown in black.</li>
    </ul>

    <h3>Dependencies</h3>
    <p>The widget loads D3.js, topojson-client, and world-atlas from jsDelivr CDN
       when first rendered. An internet connection is required on the browser side.</p>
</script>

<!-- ============================================================
     Node registration (runs in the Node-RED editor)
     ============================================================ -->
<script type="text/javascript">
    RED.nodes.registerType('rotator-widget', {
        category:    'dashboard',
        color:       '#E2D96E',
        defaults: {
            group:          { type: 'ui_group', required: true },
            size:           { value: '' },
            order:          { value: 0 },
            width:          { value: 6 },
            height:         { value: 6 },
            label:          { value: 'Rotator' },
            qth:            { value: 'JJ00' },
            currentAzimuth: { value: 0 },
            targetAzimuth:  { value: 0 },
            colorOcean:        { value: '#afd4ee' },
            colorLand:         { value: '#8dbf6a' },
            colorLandOutline:  { value: '#4a5e38' },
            colorCurrent:      { value: '#1155cc' },
            colorTarget:       { value: '#cc2200' },
            colorAligned:      { value: '#111111' },
            colorEquator:      { value: '#ffffff' },
            colorTropics:      { value: '#ddcc44' },
            colorPolarCircles: { value: '#44aadd' },
            latLineWidth:      { value: 0.8 }
        },
        inputs:  1,
        outputs: 1,
        icon:    'font-awesome/fa-compass',
        label:   function () { return this.label || 'Rotator Widget'; },

        oneditprepare: function () {
            // Reuse the standard dashboard size-picker widget
            if (typeof RED.nodes.getType('ui_button') !== 'undefined') {
                RED.nodes.getType('ui_button').prototype.oneditprepare.call(this);
            }
        },
        oneditsave: function () {
            if (typeof RED.nodes.getType('ui_button') !== 'undefined') {
                RED.nodes.getType('ui_button').prototype.oneditsave.call(this);
            }
        }
    });
</script>
