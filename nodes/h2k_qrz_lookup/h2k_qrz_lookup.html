<!-- ============================================================
     Help text
     ============================================================ -->
<script type="text/x-red" data-help-name="h2k_qrz_lookup">
    <p>Looks up a ham radio callsign on <a href="https://qrz.com" target="_blank">QRZ.com</a>
       and returns detailed station data. Requires a
       <a href="https://www.qrz.com/page/xml_data.html" target="_blank">QRZ XML subscription</a>.</p>

    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string</span></dt>
        <dd>Callsign to look up, e.g. <code>"KI2D"</code>.</dd>

        <dt>payload.call <span class="property-type">string</span></dt>
        <dd>Alternatively, an object with a <code>call</code> property. Other properties are
            preserved and the QRZ data is merged into the payload object.</dd>
    </dl>

    <h3>Output</h3>
    <p>When found, <code>msg.payload</code> is set to (or merged into) the QRZ record:</p>
    <dl class="message-properties">
        <dt>call <span class="property-type">string</span></dt>
        <dd>Callsign as registered.</dd>

        <dt>name <span class="property-type">string</span></dt>
        <dd>Full display name, e.g. <code>"Sebastian \"Baz\" Delmont"</code>.</dd>

        <dt>firstName / lastName <span class="property-type">string</span></dt>
        <dd>Given name and surname.</dd>

        <dt>allCalls <span class="property-type">string[]</span></dt>
        <dd>Primary call plus any aliases / cross-references.</dd>

        <dt>city / state / country / postal / county <span class="property-type">string</span></dt>
        <dd>Station address.</dd>

        <dt>grid <span class="property-type">string</span></dt>
        <dd>Maidenhead grid locator.</dd>

        <dt>lat / lon <span class="property-type">number</span></dt>
        <dd>Station coordinates.</dd>

        <dt>cqZone / ituZone / dxccCode <span class="property-type">number</span></dt>
        <dd>Contest zone numbers and DXCC entity code.</dd>

        <dt>tz / gmtOffset <span class="property-type">string / number</span></dt>
        <dd>Timezone name and UTC offset.</dd>

        <dt>image / imageInfo <span class="property-type">string / string[]</span></dt>
        <dd>Profile picture URL and <code>[width, height, bytes]</code>.</dd>
    </dl>

    <p>If the callsign is not found, <code>null</code> is sent (no message forwarded).</p>

    <h3>Node status</h3>
    <ul>
        <li><b>Yellow ring</b> — lookup in progress</li>
        <li><b>Green dot</b> — last successful lookup; shows call and name</li>
        <li><b>Grey dot</b> — callsign not found</li>
        <li><b>Red ring</b> — error (bad credentials, network failure)</li>
    </ul>
</script>

<script type="text/javascript">

        category: 'ham radio',
        color: '#f0c060',

            name: { value: '' }
        },
        credentials: {
            login:    { type: 'text' },
            password: { type: 'password' }
        },
        inputs:  1,
        outputs: 1,
        icon: 'font-awesome/fa-search',
        label: function () { return this.name || 'QRZ Lookup'; }
    });
</script>
