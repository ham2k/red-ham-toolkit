<!-- ============================================================
     Help text
     ============================================================ -->
<script type="text/x-red" data-help-name="h2k_wsjtx_listener">
    <p>Listens for UDP messages broadcast by <a href="https://wsjt.sourceforge.io/wsjtx.html" target="_blank">WSJT-X</a>
       and can send commands back to it. In WSJT-X go to
       <em>File → Settings → Reporting</em> and set <em>UDP Server</em> to this machine's
       address and port.</p>

    <h3>Outputs</h3>
    <p>Each received WSJT-X datagram produces one message. The <code>msg.topic</code>
       identifies the type; <code>msg.payload</code> contains the parsed fields.</p>

    <dl class="message-properties">
        <dt>topic: <code>"heartbeat"</code></dt>
        <dd>Periodic keep-alive. Payload: <code>id</code>, <code>maxSchemaNumber</code>,
            <code>version</code>, <code>revision</code>.</dd>

        <dt>topic: <code>"status"</code></dt>
        <dd>Current WSJT-X state. Payload: <code>id</code>, <code>dialFrequency</code> (Hz),
            <code>mode</code>, <code>deCall</code>, <code>deGrid</code>, <code>dxCall</code>,
            <code>dxGrid</code>, <code>txEnabled</code>, <code>transmitting</code>,
            <code>decoding</code>, <code>rxDF</code>, <code>txDF</code>, <code>txWatchdog</code>,
            <code>subMode</code>, <code>fastMode</code>, <code>specialMode</code>,
            <code>configName</code>, <code>txMessage</code>.</dd>

        <dt>topic: <code>"decode"</code></dt>
        <dd>New FT8/FT4/JT65/… decode. Payload: <code>id</code>, <code>new</code>,
            <code>time</code> ("HH:MM:SS" UTC), <code>snr</code>, <code>deltaTime</code> (s),
            <code>deltaFreq</code> (Hz), <code>mode</code>, <code>message</code>
            (e.g. <code>"CQ KI2D FN20"</code>), <code>lowConfidence</code>, <code>offAir</code>.</dd>

        <dt>topic: <code>"clear"</code></dt>
        <dd>WSJT-X cleared its decode list. Payload: <code>id</code>, <code>window</code>.</dd>

        <dt>topic: <code>"qso_logged"</code></dt>
        <dd>A QSO was logged. Payload: <code>id</code>, <code>timeOn</code>,
            <code>timeOff</code> (ISO 8601), <code>dxCall</code>, <code>dxGrid</code>,
            <code>txFrequency</code>, <code>mode</code>, <code>reportSent</code>,
            <code>reportReceived</code>, <code>txPower</code>, <code>comments</code>,
            <code>name</code>, <code>myCall</code>, <code>myGrid</code>,
            <code>operatorCall</code>, <code>exchangeSent</code>, <code>exchangeReceived</code>,
            <code>adifPropMode</code>.</dd>

        <dt>topic: <code>"close"</code></dt>
        <dd>WSJT-X is shutting down. Payload: <code>id</code>.</dd>

        <dt>topic: <code>"wspr_decode"</code></dt>
        <dd>WSPR spot. Payload: <code>id</code>, <code>new</code>, <code>time</code>,
            <code>snr</code>, <code>deltaTime</code>, <code>frequency</code> (Hz),
            <code>drift</code>, <code>callsign</code>, <code>grid</code>,
            <code>power</code> (dBm), <code>offAir</code>.</dd>

        <dt>topic: <code>"logged_adif"</code></dt>
        <dd>Raw ADIF string for a logged QSO. Payload: <code>id</code>, <code>adif</code>.</dd>

        <dt>topic: <code>"dxCall"</code></dt>
        <dd>Emitted when WSJT-X selects a new DX callsign (i.e. <code>dxCall</code> changes in a
            status message). Payload: the callsign string, e.g. <code>"KI2D"</code>.</dd>

        <dt>topic: <code>"dxGrid"</code></dt>
        <dd>Emitted together with <code>dxCall</code>. Payload: the Maidenhead grid looked up from
            the most recent decode in the last 5 minutes where that callsign announced their
            locator, e.g. <code>"FN20"</code>. Empty string if unknown. Feeds directly into
            <code>ui_h2k_rotator</code>'s <code>dxGrid</code> input.</dd>

        <dt>topic: <code>"dxInfo"</code></dt>
        <dd>Emitted together with <code>dxCall</code>. Payload: <code>{ call, grid }</code>
            combining both fields in one message.</dd>
    </dl>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>topic: <code>"halt_tx"</code></dt>
        <dd>Stop transmitting. Optional payload: <code>{ autoOnly: true }</code> to only
            stop when the watchdog triggered.</dd>

        <dt>topic: <code>"reply"</code></dt>
        <dd>Reply to a specific decode. Payload should be a <code>decode</code> payload
            object (or a compatible object with <code>time</code>, <code>snr</code>,
            <code>deltaTime</code>, <code>deltaFreq</code>, <code>mode</code>,
            <code>message</code>, <code>lowConfidence</code>).</dd>

        <dt>topic: <code>"free_text"</code></dt>
        <dd>Set the free-text message. Payload: <code>{ text: "73 DE KI2D", send: false }</code>.
            Set <code>send: true</code> to also start transmitting it immediately.</dd>

        <dt>topic: <code>"highlight_callsign"</code></dt>
        <dd>Highlight a callsign in WSJT-X's decode list. Payload:
            <code>{ callsign: "KI2D", backgroundColor: "#ffff00", foregroundColor: "#000000" }</code>.
            Omit colors to use WSJT-X defaults. Set <code>reset: true</code> to clear highlights.</dd>
    </dl>

    <h3>Node status</h3>
    <ul>
        <li><b>Grey ring</b> — initializing</li>
        <li><b>Yellow ring</b> — socket bound, waiting for first message</li>
        <li><b>Green dot</b> — receiving; shows last message type and WSJT-X instance ID</li>
        <li><b>Red ring</b> — socket error</li>
    </ul>
</script>

<script type="text/javascript">
    RED.nodes.registerType('h2k_wsjtx_listener', {
        category: 'ham radio',
        color: '#C5D5A0',
        paletteLabel: 'WSJT-X',
        defaults: {
            name:          { value: '' },
            host:          { value: '127.0.0.1' },
            port:          { value: 2237, validate: RED.validators.number() },
            wsjtxId:       { value: 'WSJT-X' },
            emitDecode:    { value: true },
            emitStatus:    { value: true },
            emitQsoLogged: { value: true },
            emitLoggedAdif:{ value: true },
            emitWsprDecode:{ value: true },
            emitHeartbeat:  { value: true },
            emitClear:      { value: true },
            emitClose:      { value: true },
            emitDxCall:     { value: true },
            emitDxGrid:     { value: true },
            emitDxInfo:     { value: true }
        },
        inputs:  1,
        outputs: 1,
        icon: 'font-awesome/fa-headphones',
        label: function () { return this.name || 'WSJT-X'; }
    });
</script>
