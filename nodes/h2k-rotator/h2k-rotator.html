    <div class="form-row">

    <div class="form-row">

    </div>

<!-- ============================================================
     Help text (shown in the Node-RED info panel)
     ============================================================ -->
<script type="text/x-red" data-help-name="h2k-rotator">
    <p>An antenna rotator widget for Node-RED Dashboard 1.0.</p>
    <p>Displays an azimuthal equidistant world map centred on your QTH with
       directional indicators for the current and target azimuths.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt>
        <dd>Current azimuth in degrees (0–359). Short-hand for <code>msg.currentAzimuth</code>.</dd>
        <dt>currentAzimuth <span class="property-type">number</span></dt>
        <dd>Current azimuth in degrees (0–359).</dd>
        <dt>targetAzimuth <span class="property-type">number</span></dt>
        <dd>Target azimuth in degrees (0–359).</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt>
        <dd>Target azimuth (degrees) selected by clicking on the map.</dd>
        <dt>topic <span class="property-type">string</span></dt>
        <dd><code>"targetAzimuth"</code></dd>
    </dl>

    <h3>Display logic</h3>
    <ul>
        <li>If current and target differ by <strong>&gt; 5°</strong>: current azimuth shown in <span style="color:blue">blue</span>, target in <span style="color:red">red</span>.</li>
        <li>If within 5°: single indicator shown in black.</li>
    </ul>

    <h3>Dependencies</h3>
    <p>The widget loads D3.js, topojson-client, and world-atlas from jsDelivr CDN
       when first rendered. An internet connection is required on the browser side.</p>
</script>

<!-- ============================================================
     Node registration (runs in the Node-RED editor)
     ============================================================ -->
<script type="text/javascript">
    RED.nodes.registerType('h2k-rotator', {
        category:    'dashboard',
        color:       '#E2D96E',
        defaults: {
            group:          { type: 'ui_group', required: true },
            size:           { value: '' },
            order:          { value: 0 },
            width:          { value: 6 },
            height:         { value: 6 },
            label:          { value: 'H2K Rotator' },
            qth:            { value: 'JJ00' },
            currentAzimuth: { value: 0 },
            targetAzimuth:  { value: 0 },
            colorOcean:           { value: '#76acd6' },
            colorLand:            { value: '#9e7e3d' },
            colorLandOutline:     { value: '#5c402e' },
            opacityLandOutline:   { value: 100 },
            colorCurrent:         { value: '#001ef9' },
            opacityCurrent:       { value: 100 },
            colorTarget:          { value: '#ff4400' },
            opacityTarget:        { value: 100 },
            colorAligned:         { value: '#000000' },
            opacityAligned:       { value: 100 },
            colorHudBg:           { value: '#888888' },
            opacityHudBg:         { value: 55 },
            colorGraticule:       { value: '#444444' },
            opacityGraticule:     { value: 40 },
            colorEquator:         { value: '#555555' },
            opacityEquator:       { value: 70 },
            colorPolarCircles:    { value: '#555555' },
            opacityPolarCircles:  { value: 55 },
            latLineWidth:         { value: 0.4 },
            defaultZoom:          { value: 1.0 },
            beamWidth:            { value: 30 },
            showLogo:             { value: true }
        },
        inputs:  1,
        outputs: 1,
        icon:    'font-awesome/fa-compass',
        label:   function () { return this.label || 'H2K Rotator'; },

        oneditprepare: function () {
            var uiButton = RED.nodes.getType('ui_button');
            if (uiButton && uiButton.prototype && typeof uiButton.prototype.oneditprepare === 'function') {
                uiButton.prototype.oneditprepare.call(this);
            }

            // Dashboard's grid-style size picker (same widget the built-in ui_* nodes use)
            if (typeof $.fn.elementSizer === 'function') {
                $('#node-input-size').elementSizer({
                    width:  '#node-input-width',
                    height: '#node-input-height',
                    group:  '#node-input-group'
                });
            }

            var DEFAULTS = {
                colorOcean:           '#76acd6',
                colorLand:            '#9e7e3d',
                colorLandOutline:     '#5c402e',
                opacityLandOutline:   100,
                colorCurrent:         '#001ef9',
                opacityCurrent:       100,
                colorTarget:          '#ff4400',
                opacityTarget:        100,
                colorAligned:         '#000000',
                opacityAligned:       100,
                colorHudBg:           '#000000',
                opacityHudBg:         55,
                colorGraticule:       '#444444',
                opacityGraticule:     40,
                colorEquator:         '#555555',
                opacityEquator:       70,
                colorPolarCircles:    '#555555',
                opacityPolarCircles:  55,
                latLineWidth:         0.4,
                defaultZoom:          1.0
            };

            // Custom variable-step spinner for defaultZoom
            (function () {
                var $z = $('#node-input-defaultZoom');
                function zoomStep(val) {
                    return val < 1.3 ? 0.05 : val < 2 ? 0.1 : 0.5;
                }
                $z.on('keydown', function (e) {
                    if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
                    e.preventDefault();
                    var val = parseFloat($(this).val()) || 1.0;
                    var step = zoomStep(e.key === 'ArrowUp' ? val : Math.max(1, val - 0.001));
                    var next = e.key === 'ArrowUp' ? val + step : val - step;
                    next = Math.round(next * 100) / 100;
                    next = Math.max(1, Math.min(20, next));
                    $(this).val(next.toFixed(2));
                });
            }());

            // Collapsible sections (closed by default)
            function makeCollapsible(toggleId, sectionId, caretId) {
                $('#' + toggleId).on('click', function (e) {
                    e.preventDefault();
                    var $section = $('#' + sectionId);
                    var $caret   = $('#' + caretId);
                    if ($section.is(':visible')) {
                        $section.hide();
                        $caret.removeClass('fa-caret-down').addClass('fa-caret-right');
                    } else {
                        $section.show();
                        $caret.removeClass('fa-caret-right').addClass('fa-caret-down');
                    }
                });
            }
            makeCollapsible('rotator-colors-toggle',   'rotator-colors-section',   'rotator-colors-caret');
            makeCollapsible('rotator-advanced-toggle', 'rotator-advanced-section', 'rotator-advanced-caret');

            $('#rotator-reset-colors').on('click', function (e) {
                e.preventDefault();
                Object.keys(DEFAULTS).forEach(function (key) {
                    $('#node-input-' + key).val(DEFAULTS[key]);
                });
            });
        },
        oneditsave: function () {
            var uiButton = RED.nodes.getType('ui_button');
            if (uiButton && uiButton.prototype && typeof uiButton.prototype.oneditsave === 'function') {
                uiButton.prototype.oneditsave.call(this);
            }
        }
    });
</script>
