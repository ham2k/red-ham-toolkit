<!-- ============================================================
     Help text
     ============================================================ -->
<script type="text/x-red" data-help-name="h2k_parse_callsign">
    <p>Parses a ham radio callsign into its component parts using
       <a href="https://github.com/ham2k/ham-js-libs/tree/main/packages/lib-callsigns" target="_blank">@ham2k/lib-callsigns</a>.
       Handles pre/post-indicators, portable and mobile suffixes, prefix overrides, and SSIDs.</p>

    <h3>Input</h3>
    <p>The node accepts three payload shapes:</p>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string</span></dt>
        <dd>A bare callsign string, e.g. <code>"KI2D"</code> or <code>"YV5/N0CALL/P"</code>.
            The output payload is replaced with the parsed callsign object.</dd>

        <dt>payload.call <span class="property-type">string</span></dt>
        <dd>An object with a <code>call</code> property, e.g. <code>{ call: "KI2D", name: "Sebastian" }</code>.
            The parsed fields are merged into the existing object.</dd>

        <dt>payload.their / payload.our <span class="property-type">object</span></dt>
        <dd>An object with <code>their</code> and/or <code>our</code> sub-objects each containing a
            <code>call</code> property. Both are parsed in place.</dd>
    </dl>

    <h3>Output fields added to the callsign object</h3>
    <dl class="message-properties">
        <dt>call <span class="property-type">string</span></dt>
        <dd>Full callsign including any indicators.</dd>

        <dt>baseCall <span class="property-type">string</span></dt>
        <dd>Callsign without pre/post-indicators.</dd>

        <dt>prefix <span class="property-type">string</span></dt>
        <dd>The resolved prefix, e.g. <code>"KI2"</code> or <code>"DL"</code>.</dd>

        <dt>ituPrefix <span class="property-type">string</span></dt>
        <dd>The ITU letter portion of the prefix without the district digit, e.g. <code>"KI"</code>.</dd>

        <dt>digit <span class="property-type">string</span></dt>
        <dd>The district digit, e.g. <code>"2"</code>.</dd>

        <dt>preindicator <span class="property-type">string</span></dt>
        <dd>Pre-indicator if present, e.g. <code>"YV5"</code> in <code>YV5/N0CALL</code>.</dd>

        <dt>postindicators <span class="property-type">string[]</span></dt>
        <dd>Array of post-indicators if present, e.g. <code>["P"]</code> in <code>N0CALL/P</code>.</dd>

        <dt>indicators <span class="property-type">string[]</span></dt>
        <dd>Well-known operating indicators such as <code>P</code>, <code>MM</code>, <code>QRP</code>.</dd>

        <dt>prefixOverride <span class="property-type">string</span></dt>
        <dd>Set when a pre- or post-indicator replaced the callsign's natural prefix.</dd>

        <dt>ssid <span class="property-type">string</span></dt>
        <dd>Secondary station identifier if present, e.g. <code>"9"</code> in <code>N0CALL-9</code>.</dd>
    </dl>
</script>
