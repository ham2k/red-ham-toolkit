<!-- ============================================================
     Help text
     ============================================================ -->
<script type="text/x-red" data-help-name="h2k_pstrotator">
    <p>Controls a <a href="https://pstrotator.com" target="_blank">PstRotator</a> instance via
       its UDP API. Sends commands on the configured port and receives position reports on
       port+1.</p>

    <p>In PstRotator: go to <em>Communication → UDP Control Port</em>, set the port number
       (default 12000), and enable <em>UDP Control</em> in Setup.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>topic: <code>"azimuth"</code> &nbsp; payload <span class="property-type">number</span></dt>
        <dd>Rotate to the given azimuth (0–360°).</dd>

        <dt>topic: <code>"elevation"</code> &nbsp; payload <span class="property-type">number</span></dt>
        <dd>Set elevation (−90 to +90°). For az+el rotators only.</dd>

        <dt>topic: <code>"stop"</code></dt>
        <dd>Stop the rotor and switch to manual mode.</dd>

        <dt>topic: <code>"park"</code></dt>
        <dd>Stop the rotor and park the antenna.</dd>

        <dt>topic: <code>"track"</code> &nbsp; payload <span class="property-type">boolean | 0 | 1</span></dt>
        <dd>Enable (<code>true</code> / <code>1</code>) or disable (<code>false</code> / <code>0</code>) tracking mode.</dd>

        <dt>topic: <code>"command"</code> &nbsp; payload <span class="property-type">string</span></dt>
        <dd>Send a raw PstRotator UDP command, e.g.
            <code>&lt;PST&gt;&lt;STOP&gt;1&lt;/STOP&gt;&lt;TRACK&gt;0&lt;/TRACK&gt;&lt;/PST&gt;</code>.
            The payload must start with <code>&lt;PST&gt;</code>.</dd>

        <dt>payload <span class="property-type">number</span></dt>
        <dd>A bare numeric payload (no recognised topic) is treated as an azimuth command.</dd>
    </dl>

    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>topic: <code>"currentAzimuth"</code> &nbsp; payload <span class="property-type">number</span></dt>
        <dd>Current rotor azimuth in degrees, reported by PstRotator.</dd>

        <dt>topic: <code>"currentElevation"</code> &nbsp; payload <span class="property-type">number</span></dt>
        <dd>Current rotor elevation in degrees (az+el rigs only).</dd>

        <dt>topic: <code>"mode"</code> &nbsp; payload <span class="property-type">string</span></dt>
        <dd><code>"tracking"</code> or <code>"manual"</code>.</dd>

        <dt>topic: <code>"ack"</code> &nbsp; payload <span class="property-type">string</span></dt>
        <dd>Acknowledgement string for commands that produce an <code>OK:…</code> response.</dd>
    </dl>

    <h3>Node status</h3>
    <ul>
        <li><b>Grey ring</b> — initializing</li>
        <li><b>Yellow ring</b> — socket bound, waiting for first response</li>
        <li><b>Green dot</b> — receiving position updates, shows last azimuth</li>
        <li><b>Red ring</b> — socket error</li>
    </ul>
</script>
